name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build project
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: programs/score-system

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dsherret/rust-toolchain-file@v1
        with:
          targets: wasm32v1-none

      - name: Install Binaryen
        run: |
          sudo wget -c https://github.com/WebAssembly/binaryen/releases/download/$BINARYEN_VERSION/binaryen-$BINARYEN_VERSION-x86_64-linux.tar.gz -O - | sudo tar -xz -C .
          sudo cp binaryen-$BINARYEN_VERSION/bin/wasm-opt /usr/bin/
        env:
          BINARYEN_VERSION: version_130

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: programs/score-system

      - name: Cargo fmt
        run: cargo fmt -- --check

      - name: Cargo clippy
        run: cargo clippy --release --all-targets -- -D warnings

      - name: Cargo build
        run: cargo build --release

      - name: Cargo test
        run: cargo test --release

      - name: Check client files
        run: |
          CLIENT_RS_FILE="client/src/score_system_client.rs"
          test -f $CLIENT_RS_FILE && git diff --exit-code $CLIENT_RS_FILE || (echo "$CLIENT_RS_FILE missing or modified" && exit 1)
          CLIENT_IDL_FILE="client/score_system_client.idl"
          test -f $CLIENT_IDL_FILE && git diff --exit-code $CLIENT_IDL_FILE || (echo "$CLIENT_IDL_FILE missing or modified" && exit 1)
